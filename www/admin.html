<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Nalin Nazareth</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#C9907A;--rose-l:#E8C4B4;--rose-p:#F7EDE8;--rose-d:#A96B55;
  --cream:#FBF7F4;--warm:#FDFAF8;--dark:#3A2820;--mid:#7A5A50;--lite:#B89890;
  --bg:#F0EAE6;--sidebar:#3A2820;--sidebar-l:#4A3830;
  --ok:#27ae60;--warn:#e67e22;--err:#e74c3c;
  --shadow:rgba(58,40,32,0.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--dark);min-height:100vh;}
input,select,textarea,button{font-family:'DM Sans',sans-serif;}
a{text-decoration:none;color:inherit;}

/* ════ LOGIN ════ */
#admin-login{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--rose-p) 0%,var(--cream) 100%);}
.alog-card{background:white;border-radius:24px;padding:40px;width:100%;max-width:400px;box-shadow:0 16px 60px var(--shadow);}
.alog-logo{text-align:center;margin-bottom:28px;}
.brand{font-family:'Cormorant Garamond',serif;font-size:28px;font-style:italic;color:var(--dark);}
.afield{margin-bottom:16px;}
.afield label{display:block;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--lite);font-weight:500;margin-bottom:7px;}
.afield input{width:100%;border:1.5px solid var(--rose-p);border-radius:12px;padding:12px 16px;font-size:15px;color:var(--dark);background:var(--warm);outline:none;}
.abtn{width:100%;background:var(--dark);color:white;border:none;border-radius:50px;padding:14px;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;}

/* ════ SHELL ════ */
#admin-shell{display:none;min-height:100vh;flex-direction:row;}
#admin-shell.active{display:flex;}
.sidebar{width:240px;background:var(--sidebar);display:flex;flex-direction:column;min-height:100vh;flex-shrink:0;position:sticky;top:0;height:100vh;}
.sb-brand{padding:28px 24px 20px;border-bottom:1px solid rgba(255,255,255,.08);color:white;}
.sb-nav{flex:1;padding:16px 12px;overflow-y:auto;}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;color:rgba(255,255,255,.65);font-size:13px;margin-bottom:2px;}
.sb-item:hover, .sb-item.active{background:rgba(255,255,255,.07);color:white;}
.sb-logout{margin:16px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);color:white;border-radius:8px;padding:8px;cursor:pointer;}

.main{flex:1;overflow-y:auto;padding:32px;}
.page{display:none;}
.page.active{display:block;}
.table-card{background:white;border-radius:16px;box-shadow:0 2px 12px var(--shadow);overflow:hidden;margin-top:20px;}
table{width:100%;border-collapse:collapse;}
th{font-size:11px;text-transform:uppercase;color:var(--lite);padding:12px 20px;text-align:left;background:var(--bg);}
td{padding:14px 20px;border-top:1px solid var(--rose-p);font-size:13px;}
.btn-sm{padding:6px 12px;border-radius:50px;border:none;font-size:11px;cursor:pointer;}
.btn-rose-sm{background:var(--rose);color:white;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:1000;}
.modal-overlay.open{display:flex;}
.modal{background:white;border-radius:20px;width:100%;max-width:500px;padding:24px;}
.mfield{margin-bottom:16px;}
.mfield label{display:block;font-size:11px;text-transform:uppercase;color:var(--lite);margin-bottom:6px;}
.mfield input, .mfield textarea{width:100%;border:1.5px solid var(--rose-p);border-radius:12px;padding:10px;outline:none;}
.upload-area{border:2px dashed var(--rose-l);border-radius:14px;padding:20px;text-align:center;cursor:pointer;background:var(--rose-p);}
.btn-full{width:100%;padding:12px;border-radius:50px;border:none;font-weight:500;cursor:pointer;margin-top:10px;}
.btn-save{background:var(--rose);color:white;}

#toast-a{position:fixed;bottom:24px;right:24px;background:var(--dark);color:white;padding:12px 22px;border-radius:50px;opacity:0;transition:0.3s;}
</style>
</head>
<body>

<div id="admin-login">
  <div class="alog-card">
    <div class="brand" style="text-align:center;margin-bottom:20px;">Nalin Nazareth</div>
    <div class="afield"><label>Usuário</label><input type="email" id="a-user" value="admin@nalinnazareth.com"></div>
    <div class="afield"><label>Senha</label><input type="password" id="a-pass" value="admin123"></div>
    <button class="abtn" onclick="adminLogin()">Entrar</button>
    <div id="a-err" style="color:var(--err);text-align:center;margin-top:10px;"></div>
  </div>
</div>

<div id="admin-shell">
  <div class="sidebar">
    <div class="sb-brand"><div class="brand">Nalin Admin</div></div>
    <div class="sb-nav">
      <div class="sb-item active" onclick="goPage('dashboard',this)">📊 Dashboard</div>
      <div class="sb-item" onclick="goPage('ebooks',this)">📖 E-books</div>
    </div>
    <button class="sb-logout" onclick="adminLogout()">Sair</button>
  </div>
  <div class="main">
    <div class="page active" id="p-dashboard"><h1>Dashboard</h1><div id="stat-row"></div></div>
    <div class="page" id="p-ebooks">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <h1>E-books</h1>
        <button class="btn-sm btn-rose-sm" onclick="openModal('modal-ebook')">+ Adicionar E-book</button>
      </div>
      <div class="table-card"><table><thead><tr><th>Título</th><th>Descrição</th><th>Data</th><th>Ações</th></tr></thead><tbody id="ebooks-tbody"></tbody></table></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-ebook">
  <div class="modal">
    <h3>Enviar E-book (PDF)</h3>
    <div class="mfield"><label>Título</label><input type="text" id="eb-titulo"></div>
    <div class="mfield"><label>Descrição</label><textarea id="eb-desc"></textarea></div>
    <div class="mfield">
      <label>Arquivo PDF</label>
      <div class="upload-area" onclick="document.getElementById('eb-file').click()">📄 Clique para selecionar</div>
      <input type="file" id="eb-file" accept=".pdf" style="display:none;" onchange="handleFileSelect()">
    </div>
    <div id="eb-file-name" style="font-size:12px;margin-bottom:10px;"></div>
    <div id="eb-err" style="color:var(--err);font-size:12px;"></div>
    <button class="btn-full btn-save" id="eb-submit" onclick="uploadEbook()">Enviar 🚀</button>
    <button class="btn-full" onclick="closeModal('modal-ebook')">Cancelar</button>
  </div>
</div>

<div id="toast-a">...</div>

<script>
const API_URL = "http://192.168.1.8:5000";
const DB={get:k=>JSON.parse(localStorage.getItem(k)),set:(k,v)=>localStorage.setItem(k,JSON.stringify(v)),del:k=>localStorage.removeItem(k)};

function adminLogin(){
  const user=document.getElementById('a-user').value;
  const pass=document.getElementById('a-pass').value;
  if(user==="admin@nalinnazareth.com" && pass==="admin123"){
    DB.set('nn_admin_session',true);
    location.reload();
  } else { document.getElementById('a-err').textContent='Erro.'; }
}
function adminLogout(){DB.del('nn_admin_session');location.reload();}

function goPage(id,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.sb-item').forEach(i=>i.classList.remove('active'));
  document.getElementById('p-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='ebooks') loadEbooks();
}

function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

function showToastA(msg){
  const t=document.getElementById('toast-a');t.textContent=msg;t.style.opacity='1';
  setTimeout(()=>t.style.opacity='0',2000);
}

let selectedFile = null;
function handleFileSelect(){
  const file=document.getElementById('eb-file').files[0];
  if(file && file.type==='application/pdf'){
    selectedFile=file;
    document.getElementById('eb-file-name').textContent='✓ '+file.name;
  }
}

function uploadEbook(){
  const titulo=document.getElementById('eb-titulo').value;
  if(!titulo || !selectedFile){ alert('Preencha tudo.'); return; }
  const formData=new FormData();
  formData.append('titulo',titulo);
  formData.append('descricao',document.getElementById('eb-desc').value);
  formData.append('file',selectedFile);
  document.getElementById('eb-submit').disabled=true;
  fetch(`${API_URL}/api/admin/upload_ebook`,{method:'POST',body:formData})
    .then(r=>r.json()).then(data=>{
      document.getElementById('eb-submit').disabled=false;
      if(data.status==='success'){
        showToastA('Enviado!');
        closeModal('modal-ebook');
        loadEbooks();
      } else { alert(data.message); }
    }).catch(()=>alert('Erro de conexão.'));
}

function loadEbooks(){
  fetch(`${API_URL}/api/ebooks`).then(r=>r.json()).then(data=>{
    document.getElementById('ebooks-tbody').innerHTML=data.map(e=>`
      <tr><td>${e.titulo}</td><td>${e.descricao}</td><td>${new Date(e.data_upload).toLocaleDateString()}</td>
      <td><button class="btn-sm" onclick="window.open('${API_URL}${e.url_pdf}')">Ver</button>
      <button class="btn-sm" onclick="deleteEbook(${e.id})">Excluir</button></td></tr>
    `).join('');
  });
}

function deleteEbook(id){
  if(confirm('Excluir?')) fetch(`${API_URL}/api/ebook/${id}`,{method:'DELETE'}).then(()=>loadEbooks());
}

if(DB.get('nn_admin_session')){
  document.getElementById('admin-login').style.display='none';
  document.getElementById('admin-shell').classList.add('active');
}
</script>
</body>
</html>
